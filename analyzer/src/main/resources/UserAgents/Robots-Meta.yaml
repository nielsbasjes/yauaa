# These are examples of robot/spider/bot useragents we have seen.

config:

# NOTE: This one is in a separate rule because we have places where it is combined with the 'real' name of the bot.
# When you share a link on facebook then the Facebook systems will try to create a preview of the page
# using one of these useragents
- matcher:
    variable:
    - 'Agent:agent.(1)product.name="facebookexternalhit"^'
    extract:
    - 'DeviceClass                         :       10 : "Robot"'
    - 'DeviceName                          :       10 : "Facebook ExternalHit"'
    - 'DeviceBrand                         :       10 : "Facebook"'
    - 'OperatingSystemClass                :       10 : "Cloud"'
    - 'OperatingSystemName                 :       10 : "Cloud"'
    - 'OperatingSystemVersion              :       10 : "<<<null>>>"'
    - 'LayoutEngineClass                   :       10 : "Robot"'
    - 'LayoutEngineName                    :       10 : "Facebook ExternalHit"'
    - 'LayoutEngineVersion                 :       10 : @Agent.version'
    - 'AgentClass                          :       10 : "Robot"'
    - 'AgentName                           :       10 : "Facebook-ExternalHit"'
    - 'AgentVersion                        :       10 : @Agent.version'

- test:
    input:
      User-Agent: "facebookexternalhit/1.1"
    expected:
      DeviceClass                          : 'Robot'                       #   400011
      DeviceName                           : 'Facebook ExternalHit'        #   400011           | FAILED; Should be 'Facebook Robot'
      DeviceBrand                          : 'Facebook'                    #   400011
      OperatingSystemClass                 : 'Cloud'                       #   400011
      OperatingSystemName                  : 'Cloud'                       #   400011
      OperatingSystemVersion               : '??'                          #   400011 [Default]
      OperatingSystemVersionMajor          : '??'                          #   400011 [Default]
      OperatingSystemNameVersion           : 'Cloud ??'                    #   400011
      OperatingSystemNameVersionMajor      : 'Cloud ??'                    #   400011
      LayoutEngineClass                    : 'Robot'
      LayoutEngineName                     : 'Facebook ExternalHit'        #       10           | FAILED; Should be '<<absent>>'
      LayoutEngineVersion                  : '1.1'                         #       10           | FAILED; Should be '<<absent>>'
      LayoutEngineVersionMajor             : '1'                           #       10           | FAILED; Should be '<<absent>>'
      LayoutEngineNameVersion              : 'Facebook ExternalHit 1.1'    #       10           | FAILED; Should be '<<absent>>'
      LayoutEngineNameVersionMajor         : 'Facebook ExternalHit 1'      #       10           | FAILED; Should be '<<absent>>'
      AgentClass                           : 'Robot'                       #   400011           | FAILED; Should be 'Special'
      AgentName                            : 'Facebook-ExternalHit'        #   400011           | FAILED; Should be 'Facebookexternalhit'
      AgentVersion                         : '1.1'                         #   400011
      AgentVersionMajor                    : '1'                           #   400011
      AgentNameVersion                     : 'Facebook-ExternalHit 1.1'    #   400011           | FAILED; Should be 'Facebookexternalhit 1.1'
      AgentNameVersionMajor                : 'Facebook-ExternalHit 1'      #   400011           | FAILED; Should be 'Facebookexternalhit 1'


