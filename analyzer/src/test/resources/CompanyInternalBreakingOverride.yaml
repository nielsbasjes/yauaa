config:

# Assume a company has the opinion a HeadlessChrome is a Baddie.
# So they want an extra rule that override the normal rules and they want to have a test to ensure it works.

# ========================================================================

- matcher:
    require:
      - 'agent.product.(1)name="HeadlessChrome"'
    extract:
      - 'DeviceClass          : 1000000 :"Baddie"'

- test:
    input:
      user_agent_string: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) HeadlessChrome/85.0.4183.121 Safari/537.36'
    expected:
      DeviceClass                          : 'Baddie'
      DeviceName                           : 'Linux Desktop'
      DeviceBrand                          : 'Unknown'
      DeviceCpu                            : 'Intel x86_64'
      DeviceCpuBits                        : '64'

